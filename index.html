<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panal de Letras</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
/* ── Palette (Strictly White, Grey, Yellow, Black) ── */
:root {
  --yellow:      #F7DA21;
  --yellow-dark: #D4B914;
  --grey-hex:    #E6E6E6;
  --grey-border: #DCDCDC;
  --white:       #FFFFFF;
  --bg:          #FFFFFF;
  --ink:         #111111;
  --ink-mid:     #666666;
  --ink-light:   #999999;
  --divider:     #E8E8E8;
  --radius:      8px;
  --shadow:      rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
header {
  width: 100%;
  background: var(--white);
  border-bottom: 1px solid var(--divider);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.3px; color: var(--ink); }
.logo span { color: var(--ink-light); font-weight: 400; }

/* Host Top-Right Controls */
#hostGameControls {
  display: none; position: absolute; right: 16px; top: 50%; 
  transform: translateY(-50%); align-items: center; gap: 6px;
}
.host-mini-select {
  padding: 2px 6px; font-size: 0.75rem; height: 26px; border-radius: 4px; 
  border: 1px solid var(--grey-border); background: var(--white); color: var(--ink); outline: none;
}
.host-mini-btn {
  padding: 0 8px; height: 26px; font-size: 0.8rem; border-radius: 4px; 
  background: var(--white); border: 1px solid var(--grey-border); cursor: pointer; color: var(--ink);
}
.host-mini-btn:hover { background: var(--grey-hex); }

/* ── Screens ── */
.screen { display: none; width: 100%; max-width: 500px; padding: 28px 20px; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 18px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 13px 26px; border: 1px solid transparent; border-radius: 50px;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  transition: background 0.15s, transform 0.08s, border-color 0.15s;
  font-family: inherit;
}
.btn:active { transform: scale(0.97); }

.btn-primary   { background: var(--ink); color: var(--white); }
.btn-primary:hover { background: #333; }

.btn-outline   { background: var(--white); color: var(--ink); border-color: var(--grey-border); }
.btn-outline:hover { background: var(--grey-hex); }

.btn-yellow    { background: var(--yellow); color: var(--ink); }
.btn-yellow:hover { background: var(--yellow-dark); }

.btn-sm { padding: 8px 18px; font-size: 0.82rem; }

/* ── Text inputs & Selects ── */
input[type="text"], select.main-select {
  width: 100%; padding: 12px 16px;
  border: 1px solid var(--grey-border); border-radius: var(--radius);
  font-size: 1rem; outline: none; font-family: inherit; color: var(--ink);
  transition: border-color 0.2s; background: var(--white);
}
input[type="text"]:focus, select.main-select:focus { border-color: var(--ink); }

/* ── Common UI Elements ── */
.screen-title { width: 100%; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; font-weight: 800; }
.field-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-mid); margin-bottom: 7px; }
.field-block { width: 100%; }

/* ── Home screen ── */
.home-hero { text-align: center; padding: 16px 0 8px; }
.home-hero h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; }
.home-hero p  { color: var(--ink-mid); margin-top: 8px; font-size: 0.92rem; line-height: 1.5; }

.choice-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.choice-btn {
  width: 100%; padding: 16px 18px;
  border: 1px solid var(--grey-border); border-radius: var(--radius);
  background: var(--white); cursor: pointer; text-align: left;
  transition: border-color 0.18s, background 0.18s; font-family: inherit; color: var(--ink);
}
.choice-btn:hover { border-color: var(--ink); background: #fafafa; }
.choice-btn .ct { font-weight: 700; font-size: 0.95rem; }
.choice-btn .cd { font-size: 0.8rem; color: var(--ink-light); margin-top: 3px; }

/* ── Lobby Screen ── */
.code-display {
  font-size: 2.5rem; font-weight: 900; letter-spacing: 5px;
  margin: 10px 0 20px; padding: 15px; background: var(--grey-hex);
  border-radius: var(--radius); text-align: center; width: 100%;
}
.player-list {
  width: 100%; border: 1px solid var(--grey-border); border-radius: var(--radius);
  padding: 10px; min-height: 100px; max-height: 250px; overflow-y: auto; text-align: left;
}
.player-item { padding: 8px; border-bottom: 1px solid var(--divider); font-weight: 700; display: flex; align-items: center; gap: 8px; }
.player-item:last-child { border-bottom: none; }
.host-badge { background: var(--yellow); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; color: var(--ink); }

/* ── Countdown Overlay ── */
#countdownOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,255,255,0.95); z-index: 9999;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; text-align: center;
}
#countdownOverlay.active { display: flex; }
#countdownOverlay h2 { font-size: 7rem; font-weight: 900; color: var(--ink); animation: pop 1s infinite; margin-top: 10px; }
@keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 30% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0; } }

/* ── Game screen ── */
#screenGame .screen-inner {
  width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0 20px 28px;
}

/* Score bar & UI */
.score-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 0 16px; border-bottom: 1px solid var(--divider); margin-bottom: 10px; }
.score-main { display: flex; align-items: baseline; gap: 5px; }
.score-num  { font-size: 2rem; font-weight: 900; line-height: 1; }
.score-pts  { font-size: 0.8rem; color: var(--ink-light); font-weight: 600; }
.rank-txt   { font-size: 0.82rem; color: var(--ink-mid); margin-top: 2px; }
.score-right { text-align: right; }
.wc-num { font-size: 1.5rem; font-weight: 900; }
.wc-lbl { font-size: 0.75rem; color: var(--ink-light); }

/* Timer Display */
.timer-display {
  font-size: 1.5rem; font-weight: 900; color: var(--ink); 
  background: var(--grey-hex); padding: 6px 16px; 
  border-radius: 50px; letter-spacing: 2px; text-align: center;
}
.timer-display.danger {
  color: var(--white); background: var(--ink); animation: pulseTimer 1s infinite;
}
@keyframes pulseTimer { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

.word-display { font-size: 1.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center; min-height: 2.4rem; color: var(--ink); display: flex; align-items: center; justify-content: center; padding: 8px 0 4px; width: 100%; }
